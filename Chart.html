<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Review</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #ffffff;
        text-align: center;
    }

    h2 {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
    }

    /* Tabs container */
    .tabs {
        display: flex;
        justify-content: space-around;
        margin: 20px 10px 10px 10px;
        border-bottom: 2px solid #ddd;
        overflow-x: auto;
        white-space: nowrap;
        padding-right: 20px; /* NEW: prevents AA from being cut off */
    }

    /* Individual tab */
    .tab {
        padding: 10px 14px;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
        color: #555;
        border-bottom: 3px solid transparent;
        flex-shrink: 0;
        min-width: 60px; /* NEW: ensures readable spacing */
    }

    /* Active tab */
    .tab.active {
        color: #EC407A;
        border-bottom: 3px solid #EC407A;
    }

    /* Legend */
    .legend {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 10px 0 5px 0;
        font-size: 12px;
        font-weight: bold;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .legend-color {
        width: 12px;
        height: 12px;
        border-radius: 50%;
    }

    #chartContainer {
        width: 100%;
        max-width: 500px;
        margin: auto;
        padding: 10px;
    }

    #statusMessage {
        margin-top: 40px;
        font-size: 18px;
        color: #777;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<h2>Performance Review</h2>

<!-- Tabs -->
<div class="tabs">
    <div class="tab active" onclick="switchTab('vault')">Vault</div>
    <div class="tab" onclick="switchTab('bars')">Bars</div>
    <div class="tab" onclick="switchTab('beam')">Beam</div>
    <div class="tab" onclick="switchTab('floor')">Floor</div>
    <div class="tab" onclick="switchTab('allAround')">AA</div>
</div>

<!-- Legend -->
<div class="legend">
    <div class="legend-item">
        <div class="legend-color" style="background:#42A5F5;"></div>
        <span>Level 2</span>
    </div>
    <div class="legend-item">
        <div class="legend-color" style="background:#AB47BC;"></div>
        <span>Level 3</span>
    </div>
    <div class="legend-item">
        <div class="legend-color" style="background:#FFA726;"></div>
        <span>Level 4</span>
    </div>
</div>

<div id="chartContainer">
    <canvas id="chartCanvas"></canvas>
</div>

<div id="statusMessage">Waiting for scores…</div>

<script>
let chartInstance = null;
let currentTab = "vault";

function switchTab(tabName) {
    currentTab = tabName;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add("active");

    if (window.sortedData) {
        drawChart(window.sortedData);
    }
}

function drawChart(rows) {
    if (!rows || rows.length === 0) {
        document.getElementById("statusMessage").innerText = "No scores available.";
        return;
    }

    document.getElementById("statusMessage").style.display = "none";

    const labels = rows.map(r => r.date || "");

    const level2 = rows.map(r => Number(r[currentTab + "_2"]) || 0);
    const level3 = rows.map(r => Number(r[currentTab + "_3"]) || 0);
    const level4 = rows.map(r => Number(r[currentTab + "_4"]) || 0);

    const ctx = document.getElementById("chartCanvas").getContext("2d");

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [
                {
                    label: "Level 2",
                    data: level2,
                    borderColor: "#42A5F5",
                    backgroundColor: "rgba(66,165,245,0.2)",
                    borderWidth: 3,
                    tension: 0.3
                },
                {
                    label: "Level 3",
                    data: level3,
                    borderColor: "#AB47BC",
                    backgroundColor: "rgba(171,71,188,0.2)",
                    borderWidth: 3,
                    tension: 0.3
                },
                {
                    label: "Level 4",
                    data: level4,
                    borderColor: "#FFA726",
                    backgroundColor: "rgba(255,167,38,0.2)",
                    borderWidth: 3,
                    tension: 0.3
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: false }
            }
        }
    });
}

window.addEventListener("message", function(event) {
    try {
        const rows = JSON.parse(event.data);
        window.sortedData = rows;
        drawChart(rows);
    } catch (e) {
        console.error("Invalid JSON received:", e);
    }
});
</script>

</body>
</html>
